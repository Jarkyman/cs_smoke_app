name: cs_smoke_app
description: A CS2 utility app.
publish_to: "none"

version: 1.2.2+12

environment:
  sdk: ">=3.0.6 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.9
  provider: ^6.1.2
  youtube_player_iframe: ^6.0.0
  bordered_text: ^3.0.2
  firebase_core: ^4.9.0
  firebase_analytics: ^12.4.1
  firebase_crashlytics: ^5.2.2
  share_plus: ^13.1.0
  url_launcher: ^6.3.1
  rate_my_app: ^2.4.0
  flutter_launch_store: ^1.0.8
  flutter_local_notifications: ^21.0.0
  rxdart: ^0.28.0
  permission_handler: ^12.0.1
  shared_preferences: ^2.5.5
  flutter_timezone: ^5.0.2
  google_mobile_ads: ^8.0.0
  http: ^1.6.0
  flutter_dotenv: ^6.0.1
  path_provider: ^2.1.5
  universal_io: ^2.3.1
  package_info_plus: ^10.1.0
  timezone: ^0.11.0
  vector_math: ^2.2.0
  intl: ^0.20.2
  flutter_localizations:
    sdk: flutter
  cloud_firestore: ^6.4.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  flutter_native_splash: ^2.4.4

flutter_native_splash:
  color: "#02010f"
  image: assets/icons/Logo.png
  android: true
  ios: true
  android_gravity: center
  fullscreen: false

flutter:
  generate: true
  uses-material-design: true

  assets:
    - .env
    - assets/icons/
    - assets/img/
    - assets/img/maps/
    - assets/img/radar/
    - assets/img/callouts/
    - assets/img/map logo/
